# XDG Base Directories
XDG_DATA_HOME="${HOME}/.local/share"
XDG_CONFIG_HOME="${HOME}/.config"
XDG_STATE_HOME="${HOME}/.local/state"
XDG_CACHE_HOME="${HOME}/.cache"
XDG_DATA_DIRS="${HOME}/.guix-profile/share:/usr/local/share/:/usr/share/:${XDG_DATA_DIRS}"
XDG_CONFIG_DIRS="/etc/xdg"

# Cursor Path
XCURSOR_PATH="${HOME}/.local/share/icons:${HOME}/.icons:/usr/local/share/icons:/usr/share/icons:${XCURSOR_PATH}"

# Guix Paths
GUIX_LOCPATH="${HOME}/.guix-profile/lib/locale:${GUIX_LOCPATH}"
GUIX_PROFILE_BIN="${HOME}/.guix-profile/bin"
GUIX_CURRENT_BIN="${HOME}/.config/guix/current/bin"

# Standard Paths
PATH="${GUIX_CURRENT_BIN}:${GUIX_PROFILE_BIN}:${PATH}"
INFOPATH="${GUIX_CURRENT_BIN}/share/info:${HOME}/.guix-profile/share/info:${INFOPATH}"
MANPATH="${GUIX_CURRENT_BIN}/share/man:${HOME}/.guix-profile/share/man:${MANPATH}"

# Guile / Geiser Support
GUILE_LOAD_PATH="${HOME}/.config/guix/current/share/guile/site/3.0:${GUILE_LOAD_PATH}"
GUILE_LOAD_COMPILED_PATH="${HOME}/.config/guix/current/lib/guile/3.0/site-ccache:${GUILE_LOAD_COMPILED_PATH}"
